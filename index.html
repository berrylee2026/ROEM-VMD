function comp(file,mw,q,cb){
  var r=new FileReader();
  r.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var c=document.createElement("canvas"),w=img.width,h=img.height;
      if(w>mw){h=Math.round(h*mw/w);w=mw;}
      c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
      cb(c.toDataURL("image/jpeg",q));
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}

function movePin(pid, dir){

  var newIdx=idx+dir;
  if(newIdx<0||newIdx>=pids.length)return;

  var a=pids[idx], b=pids[newIdx];
  var tmpA=JSON.parse(JSON.stringify(iPins[a]));
  var tmpB=JSON.parse(JSON.stringify(iPins[b]));
  iPins[a]=tmpB;
  iPins[b]=tmpA;
  sImpl();
}
