    var img=new Image();
    img.onload=function(){
      var c=document.createElement("canvas"),w=img.width,h=img.height;
      if(w>mw){h=Math.round(h*mw/w);w=mw;}

}

function aiEval(sid,zi,photo){
  var zoneName=CZ[zi];
  var storeName=SS.find(function(s){return s.id===sid;}).n;
  var now=new Date();
  var tm=(now.getMonth()+1)+"/"+now.getDate()+" "+String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
  var loadingKey=null;
  db.ref("core/"+sid+"/"+zi+"/fb").push({text:"🤖 AI 평가 중...",time:tm,isA:true}).then(function(ref){loadingKey=ref.key;});

  var criteria={
    "VP":[
      {no:1,item:"메인VP존 마네킹 전마 상품 풀코디 착장",score:10},
      {no:2,item:"마네킹 사양 통일",score:10},
      {no:3,item:"전마 상품 POP 고지",score:10}
    ],
    "VP 메인 바닥집기":[
      {no:4,item:"행어링 상품(컬러/아이템) 교육자료와 동일",score:10},
      {no:5,item:"유사한 간격으로 행어링",score:10}
    ],
    "WIN":[
      {no:6,item:"메인VP존 마네킹 전마 상품 풀코디 착장",score:10},
      {no:7,item:"마네킹 사양 통일",score:10},
      {no:8,item:"전마 상품 POP 고지",score:10}
    ],
    "메인 FACE":[
      {no:9,item:"W1,200 페이스 기준 10SKU 진열(앞보기3, 옆보기7SKU)",score:10},
      {no:10,item:"행어링 상품(컬러/아이템) 교육자료와 동일",score:10}
    ]
  };

  var zoneItems=criteria[zoneName]||[];
  var criteriaText=zoneItems.map(function(c){return "No."+c.no+" ("+c.score+"점): "+c.item;}).join("\n");
  var maxScore=zoneItems.reduce(function(a,c){return a+c.score;},0);

  var refImgs=[];
  Object.values(mapZones).forEach(function(z){if(z.photo)refImgs.push(z.photo);});
  Object.values(iPins).forEach(function(p){if(p.photo)refImgs.push(p.photo);});

  var userContent=[];
  userContent.push({type:"text",text:"당신은 패션 브랜드 ROEM의 VMD 전문가입니다.\n\n매장: "+storeName+"\n구역: "+zoneName+"\n\n[평가 기준]\n"+criteriaText+"\n\n위 기준으로 사진을 평가하세요.\n\n반드시 아래 형식으로만 출력하세요:\n---상세---\nNo.번호 - 점수/만점 - 한줄평가\n(항목 수만큼 반복)\n총점: XX/"+maxScore+"점\n---요약---\n한 문장으로 핵심만 (예: 마네킹 착장 양호, POP 미설치 개선 필요)"});
  userContent.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:photo.split(",")[1]}});
  if(refImgs.length>0){
    refImgs.slice(0,3).forEach(function(img){
      userContent.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:img.split(",")[1]}});
    });
  }

  fetch("https://2026.leejuyeon337.workers.dev/",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-opus-4-5",max_tokens:600,messages:[{role:"user",content:userContent}]})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    var result=data.content&&data.content[0]?data.content[0].text:"평가 실패";
    var now2=new Date();
    var tm2=(now2.getMonth()+1)+"/"+now2.getDate()+" "+String(now2.getHours()).padStart(2,"0")+":"+String(now2.getMinutes()).padStart(2,"0");
    if(loadingKey)db.ref("core/"+sid+"/"+zi+"/fb/"+loadingKey).remove();

    // 상세/요약 파싱
    var detailMatch=result.match(/---상세---([\s\S]*?)---요약---/);
    var summaryMatch=result.match(/---요약---([\s\S]*?)$/);
    var detail=detailMatch?detailMatch[1].trim():result;
    var summary=summaryMatch?summaryMatch[1].trim():result;

    // 점수 파싱
    var scoreMatch=detail.match(/총점[:\s]*([0-9]+)/);
    var score=scoreMatch?parseInt(scoreMatch[1]):null;
    db.ref("core/"+sid+"/"+zi+"/aiScore").set(score);

    // Firebase에 상세/요약 분리 저장
    db.ref("core/"+sid+"/"+zi+"/fb").push({
      text:summary,           // 유저용 요약
      detail:"🤖 AI 평가 상세:\n"+detail,  // 관리자용 상세
      time:tm2,
      isA:true,
      isAiResult:true
    });
    checkTotalScore(sid);
  })
  .catch(function(e){
    if(loadingKey)db.ref("core/"+sid+"/"+zi+"/fb/"+loadingKey).remove();
    var now2=new Date();
    var tm2=(now2.getMonth()+1)+"/"+now2.getDate()+" "+String(now2.getHours()).padStart(2,"0")+":"+String(now2.getMinutes()).padStart(2,"0");
    db.ref("core/"+sid+"/"+zi+"/fb").push({text:"AI 평가 실패",time:tm2,isA:true});
  });
}

function checkTotalScore(sid){
  var refs=CZ.map(function(_,i){return db.ref("core/"+sid+"/"+i+"/aiScore").once("value");});
  Promise.all(refs).then(function(snaps){
    var scores=snaps.map(function(s){return s.val();});
    var allDone=scores.every(function(s){return s!==null;});
    if(!allDone)return;
    var total=scores.reduce(function(a,b){return a+(b||0);},0);
    var grade=total>=91?"A등급":total>=81?"B등급":total>=71?"C등급":total>=61?"D등급":total>=51?"E등급":"F등급";
    var storeName=SS.find(function(s){return s.id===sid;}).n;
    var now=new Date();
    var tm=(now.getMonth()+1)+"/"+now.getDate()+" "+String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
    var summaryText="🏆 최종: "+total+"/100점 · "+grade;
    var detailText="🏆 "+storeName+" 최종 평가\n총점: "+total+"/100점 | "+grade+"\nVP: "+scores[0]+"점 / VP메인바닥집기: "+scores[1]+"점 / WIN: "+scores[2]+"점 / 메인FACE: "+scores[3]+"점";
    db.ref("core/"+sid+"/0/fb").push({
      text:summaryText,
      detail:detailText,
      time:tm,
      isA:true,
      isAiResult:true,
      isFinal:true
    });
  });
}
